version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  livekit:
    image: livekit/livekit-server:latest
    command: --redis-host redis:6379
    environment:
      # FIXED: Added quotation marks around the entire string
      - "LIVEKIT_KEYS=devkey: secret"
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    depends_on:
      - redis

  sip:
    image: livekit/sip:latest
    ports:
      - "5060:5060"
      - "5060:5060/udp"
      # Narrowed RTP port range for easier local testing
      - "10000-10050:10000-10050/udp"
    environment:
      SIP_CONFIG_BODY: |
        api_key: 'devkey'
        api_secret: 'secret'
        ws_url: 'ws://livekit:7880'
        redis:
          address: 'redis:6379'
        sip_port: 5060
        rtp_port: 10000-10050
        use_external_ip: true
        logging:
          level: debug
    depends_on:
      - livekit

  egress:
    image: livekit/egress:latest
    cap_add:
      - SYS_ADMIN # Strictly required for the internal recording sandbox
    environment:
      EGRESS_CONFIG_BODY: |
        api_key: 'devkey'
        api_secret: 'secret'
        ws_url: 'ws://livekit:7880'
        redis:
          address: 'redis:6379'
    volumes:
      - ./egress-output:/out
    depends_on:
      - livekit