version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  livekit:
    image: livekit/livekit-server:latest
    # --dev mode automatically sets up the API key/secret and bypasses the need for a livekit.yaml file
    command: --dev --redis-host localhost:6379
    network_mode: host
    depends_on:
      - redis

  sip:
    image: livekit/sip:latest
    network_mode: host
    environment:
      SIP_CONFIG_BODY: |
        api_key: 'devkey'
        api_secret: 'secret'
        ws_url: 'ws://localhost:7880'
        redis:
          address: 'localhost:6379'
        sip_port: 5060
        rtp_port: 10000-20000
        use_external_ip: true
        logging:
          level: debug
    depends_on:
      - livekit

  egress:
    image: livekit/egress:latest
    network_mode: host
    cap_add:
      - SYS_ADMIN # Strictly required for the internal recording sandbox
    environment:
      # Standard environment variables replace the need for an egress.yaml file
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret
      - LIVEKIT_WS_URL=ws://localhost:7880
      - REDIS_ADDRESS=localhost:6379
    volumes:
      - ./egress-output:/out
    depends_on:
      - livekit